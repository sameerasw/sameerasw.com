name: Daily Unsplash Wallpaper Update

on:
  schedule:
    # Runs at 02:00 UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      target:
        description: 'Which wallpaper to update'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - desktop
          - mobile

jobs:
  update-wallpaper:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and Select Daily Wallpaper
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          TARGET: ${{ inputs.target || 'both' }}
        run: node .github/scripts/daily-unsplash.js

      - name: Send Telegram Notification
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
          TARGET: ${{ inputs.target || 'both' }}
        run: |
          METADATA_FILE="public/unsplash-today.json"
          if [ -f "$METADATA_FILE" ]; then
            FINAL_CHAT_ID="${CHAT_ID:- -1001653455300}"
            FINAL_TOPIC_ID="${TOPIC_ID:-71370}"
            
            # Desktop — skip if mobile-only run
            if [ "$TARGET" = "both" ] || [ "$TARGET" = "desktop" ]; then
              DESKTOP_URL=$(jq -r '.url // empty' "$METADATA_FILE")
              if [ -n "$DESKTOP_URL" ] && [ -n "$BOT_TOKEN" ]; then
                AUTHOR_NAME=$(jq -r '.author.name' "$METADATA_FILE")
                AUTHOR_LINK=$(jq -r '.author.link' "$METADATA_FILE")
                UNSPLASH_LINK=$(jq -r '.link' "$METADATA_FILE")
                MESSAGE_DESKTOP="<a href=\"$DESKTOP_URL\">&#8205;</a>🖥 <b>New Daily Desktop Wallpaper!</b>"$'\n\n'"👤 <b>Photographer:</b> <a href=\"$AUTHOR_LINK\">$AUTHOR_NAME</a>"$'\n'"🔗 <b>Unsplash Link:</b> <a href=\"$UNSPLASH_LINK\">View Photo</a>"
                jq -n \
                  --arg chat_id "$FINAL_CHAT_ID" \
                  --arg thread_id "$FINAL_TOPIC_ID" \
                  --arg text "$MESSAGE_DESKTOP" \
                  '{chat_id: $chat_id, message_thread_id: $thread_id, text: $text, parse_mode: "HTML", disable_web_page_preview: false}' > payload_desktop.json
                curl -X POST -H "Content-Type: application/json" -d @payload_desktop.json https://api.telegram.org/bot$BOT_TOKEN/sendMessage
              fi
            fi
            
            # Mobile — skip if desktop-only run
            if [ "$TARGET" = "both" ] || [ "$TARGET" = "mobile" ]; then
              MOBILE_URL=$(jq -r '.mobile.url // empty' "$METADATA_FILE")
              if [ -n "$MOBILE_URL" ] && [ -n "$BOT_TOKEN" ]; then
                AUTHOR_NAME_M=$(jq -r '.mobile.author.name' "$METADATA_FILE")
                AUTHOR_LINK_M=$(jq -r '.mobile.author.link' "$METADATA_FILE")
                UNSPLASH_LINK_M=$(jq -r '.mobile.link' "$METADATA_FILE")
                MESSAGE_MOBILE="<a href=\"$MOBILE_URL\">&#8205;</a>📱 <b>New Daily Mobile Wallpaper!</b>"$'\n\n'"👤 <b>Photographer:</b> <a href=\"$AUTHOR_LINK_M\">$AUTHOR_NAME_M</a>"$'\n'"🔗 <b>Unsplash Link:</b> <a href=\"$UNSPLASH_LINK_M\">View Photo</a>"
                jq -n \
                  --arg chat_id "$FINAL_CHAT_ID" \
                  --arg thread_id "$FINAL_TOPIC_ID" \
                  --arg text "$MESSAGE_MOBILE" \
                  '{chat_id: $chat_id, message_thread_id: $thread_id, text: $text, parse_mode: "HTML", disable_web_page_preview: false}' > payload_mobile.json
                curl -X POST -H "Content-Type: application/json" -d @payload_mobile.json https://api.telegram.org/bot$BOT_TOKEN/sendMessage
              fi
            fi
            
            if [ -z "$BOT_TOKEN" ]; then
              echo "Telegram Bot Token is not set. Skipping message dispatch."
            fi
          else
            echo "Wallpaper metadata file not found."
          fi

      - name: Commit and push if changed
        run: |
          git config --global user.name 'sameerasw'
          git config --global user.email 'mail@sameerasw.com'
          git add public/unsplash-today.json .github/scripts/unsplash-history.json .github/scripts/unsplash-mobile-history.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update daily unsplash wallpaper" && git push)
